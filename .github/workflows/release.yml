name: Release

on:
  push:
    tags:
      - 'v*'
  release:
    types:
      - published
  workflow_dispatch:

concurrency:
  group: release-${{ github.event.release.tag_name || github.ref_name || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest
    env:
      APP_NAME: reel

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release version
        id: meta
        run: |
          set -euo pipefail
          TAG_NAME="${GITHUB_REF_NAME}"
          if [[ "${{ github.event_name }}" == "release" ]]; then
            TAG_NAME="${{ github.event.release.tag_name }}"
          fi

          VERSION="${TAG_NAME#v}"
          if [[ -z "$VERSION" || "$VERSION" == "$GITHUB_REF_NAME" ]]; then
            VERSION="$(grep -oPm1 '(?<=<version>)[^<]+' appinfo/info.xml)"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag_name=$TAG_NAME" >> "$GITHUB_OUTPUT"

      - name: Read package.json node and npm engines version
        uses: skjnldsv/read-package-engines-version-actions@v3
        id: versions
        with:
          fallbackNode: '^20'
          fallbackNpm: '^10'

      - name: Set up node ${{ steps.versions.outputs.nodeVersion }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ steps.versions.outputs.nodeVersion }}

      - name: Set up npm ${{ steps.versions.outputs.npmVersion }}
        run: npm i -g "npm@${{ steps.versions.outputs.npmVersion }}"

      - name: Set up php
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, dom, curl, fileinfo, gd, intl, openssl, sqlite, pdo_sqlite, zip
          coverage: none

      - name: Install frontend dependencies and build assets
        env:
          CYPRESS_INSTALL_BINARY: 0
          PUPPETEER_SKIP_DOWNLOAD: true
        run: |
          npm ci
          npm run build

      - name: Install production PHP dependencies
        run: composer install --no-dev --prefer-dist --no-interaction --no-progress --optimize-autoloader

      - name: Build release archives
        run: |
          set -euo pipefail

          APP_ID="$APP_NAME"
          VERSION="${{ steps.meta.outputs.version }}"

          BUILD_ROOT="build/release"
          STAGE_DIR="$BUILD_ROOT/stage"
          APP_DIR="$STAGE_DIR/$APP_ID"

          rm -rf "$BUILD_ROOT"
          mkdir -p "$APP_DIR"

          rsync -a ./ "$APP_DIR/" \
            --exclude '.git/' \
            --exclude '.github/' \
            --exclude 'build/' \
            --exclude 'node_modules/' \
            --exclude 'src/' \
            --exclude 'tests/' \
            --exclude 'vendor-bin/' \
            --exclude '.vscode/' \
            --exclude '.idea/' \
            --exclude '*.iml' \
            --exclude '.DS_Store' \
            --exclude '._*'

          tar -czf "$BUILD_ROOT/${APP_ID}-${VERSION}.tar.gz" -C "$STAGE_DIR" "$APP_ID"
          (cd "$STAGE_DIR" && zip -qr "../${APP_ID}-${VERSION}.zip" "$APP_ID")
          (cd "$BUILD_ROOT" && shasum -a 256 "${APP_ID}-${VERSION}.tar.gz" "${APP_ID}-${VERSION}.zip" > "${APP_ID}-${VERSION}.sha256")

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: reel-release-artifacts
          path: |
            build/release/*.tar.gz
            build/release/*.zip
            build/release/*.sha256

      - name: Publish GitHub release
        if: startsWith(steps.meta.outputs.tag_name, 'v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag_name }}
          files: |
            build/release/*.tar.gz
            build/release/*.zip
            build/release/*.sha256

      - name: Check App Store credentials availability
        id: appstore
        env:
          APPSTORE_TOKEN: ${{ secrets.APPSTORE_TOKEN }}
          APP_PRIVATE_KEY: ${{ secrets.APP_PRIVATE_KEY }}
        run: |
          if [[ -n "$APPSTORE_TOKEN" && -n "$APP_PRIVATE_KEY" ]]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish signed release to Nextcloud App Store
        if: startsWith(steps.meta.outputs.tag_name, 'v') && steps.appstore.outputs.enabled == 'true'
        uses: R0Wi/nextcloud-appstore-push-action@v1.0.4
        with:
          app_name: ${{ env.APP_NAME }}
          appstore_token: ${{ secrets.APPSTORE_TOKEN }}
          download_url: https://github.com/${{ github.repository }}/releases/download/${{ steps.meta.outputs.tag_name }}/${{ env.APP_NAME }}-${{ steps.meta.outputs.version }}.tar.gz
          app_private_key: ${{ secrets.APP_PRIVATE_KEY }}
          nightly: false
